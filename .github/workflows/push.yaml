name: push

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      git_tag:
        required: true
        type: string
      tag_exists:
        required: true
        type: string

    outputs:
      push_result:
        description: "push job result"
        value: ${{ jobs.push.outputs.result }}
      tag:
        description: "The image tag that was pushed"
        value: ${{ jobs.push.outputs.tag }}


jobs:
  push:
    name: push
    runs-on: ubuntu-latest

    permissions: 
      id-token: write  
      contents: read
    
    outputs:
      result: ${{ job.status }}
      tag:    ${{ inputs.git_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.service_name }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/image.tar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::854929211842:role/github.to.aws.oidc
          aws-region: us-east-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 \
          | docker login --username AWS --password-stdin 854929211842.dkr.ecr.us-east-1.amazonaws.com

      - name: Tag and push versioned image
        run: |
          IMAGE_TAG="854929211842.dkr.ecr.us-east-1.amazonaws.com/hipstershop-${{ inputs.service_name }}:${{ inputs.git_tag }}"
          LOADED_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -n1)
          docker tag "$LOADED_IMAGE" "$IMAGE_TAG"
          docker push "$IMAGE_TAG"

      - name: Tag and push latest (main only)
        if: github.ref_name == 'main'
        run: |
          IMAGE_TAG="854929211842.dkr.ecr.us-east-1.amazonaws.com/hipstershop-${{ inputs.service_name }}:${{ inputs.git_tag }}"
          IMAGE_LATEST="854929211842.dkr.ecr.us-east-1.amazonaws.com/hipstershop-${{ inputs.service_name }}:latest"
          docker tag $IMAGE_TAG $IMAGE_LATEST
          docker push $IMAGE_LATEST

      - name: Create and push git tag (main only, if not exists)
        if: github.ref_name == 'main' && inputs.tag_exists != 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag ${{ inputs.git_tag }}
          git push origin ${{ inputs.git_tag }}
