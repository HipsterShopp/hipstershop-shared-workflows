name: push

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      image_latest:
        required: true
        type: string
      git_tag:
        required: true
        type: string
      tag_exists:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

    outputs:
      push_result:
        description: "push job result"
        value: ${{ jobs.push.outputs.result }}


jobs:
  push:
    name: push
    runs-on: ubuntu-latest
    outputs:
      result: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.service_name }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push versioned image tag
        run: docker push ${{ inputs.image_tag }}

      - name: Tag and push latest (main only)
        if: github.ref_name == 'main'
        run: |
          docker tag ${{ inputs.image_tag }} ${{ inputs.image_latest }}
          docker push ${{ inputs.image_latest }}

      - name: Create and push git tag (main only, if not exists)
        if: github.ref_name == 'main' && inputs.tag_exists != 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag ${{ inputs.git_tag }}
          git push origin ${{ inputs.git_tag }}