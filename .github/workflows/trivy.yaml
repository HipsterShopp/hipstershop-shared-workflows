 
on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      runtime:
        required: true
        type: string
      github_event_name:
        required: true
        type: string
      node-version:
        type: string
        default: "20"
      python-version:
        type: string
        default: "3.11"
      go-version:
        type: string
        default: "1.22"
      java-version:
        type: string
        default: "21"
      dotnet-version:
        type: string
        default: "8.0"
      java-build-tool:
        type: string
        default: "maven"

    secrets:
      DOCKERHUB_USERNAME:
      DOCKERHUB_TOKEN:
    
trivy:
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build-image.result == 'success'
    steps:

      - name: Extract image tags
        id: meta
        run: |
          echo "image_tag=${{ secrets.DOCKERHUB_USERNAME }}/hipstershop-${{ inputs.service_name }}:${{ needs.generate-tag.outputs.tag }}" >> $GITHUB_OUTPUT

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.service_name }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/image.tar

      - name: Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image_tag }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true


  # push:
  #   name: push
  #   runs-on: ubuntu-latest
  #   needs: [build-image, trivy, generate-tag]
  #   # if: inputs.github_event_name == 'push'
push:
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.trivy.result == 'success' &&
      needs.build-image.result == 'success'
    outputs:
      tag: ${{ needs.generate-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Extract image tags
        id: meta
        run: |
          echo "image_tag=${{ secrets.DOCKERHUB_USERNAME }}/hipstershop-${{ inputs.service_name }}:${{ needs.generate-tag.outputs.tag }}" >> $GITHUB_OUTPUT
          echo "image_latest=${{ secrets.DOCKERHUB_USERNAME }}/hipstershop-${{ inputs.service_name }}:latest" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.service_name }}
          path: /tmp

      - run: docker load -i /tmp/image.tar

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - run: docker push ${{ steps.meta.outputs.image_tag }}

      - run: |
          docker tag ${{ steps.meta.outputs.image_tag }} ${{ steps.meta.outputs.image_latest }}
          docker push ${{ steps.meta.outputs.image_latest }}

      - if: >
          github.ref_name == 'main' &&
          needs.generate-tag.outputs.tag_exists != 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.generate-tag.outputs.tag }}
          git push origin ${{ needs.generate-tag.outputs.tag }}
