on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      runtime:
        required: true
        type: string
      github_event_name:
        required: true
        type: string
      node-version:
        type: string
        default: "20"
      python-version:
        type: string
        default: "3.11"
      go-version:
        type: string
        default: "1.22"
      java-version:
        type: string
        default: "21"
      dotnet-version:
        type: string
        default: "8.0"
      java-build-tool:
        type: string
        default: "maven"

    secrets:
      DOCKERHUB_USERNAME:
      DOCKERHUB_TOKEN:

build-image:
    runs-on: ubuntu-latest
    name: build image
    if: |
      always() &&
      needs.generate-tag.result == 'success' &&
      needs.generate-tag.outputs.image_exists != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image tags
        id: meta
        run: |
          echo "image_tag=${{ secrets.DOCKERHUB_USERNAME }}/hipstershop-${{ inputs.service_name }}:${{ needs.generate-tag.outputs.tag }}" >> $GITHUB_OUTPUT
          echo "image_latest=${{ secrets.DOCKERHUB_USERNAME }}/hipstershop-${{ inputs.service_name }}:latest" >> $GITHUB_OUTPUT

      - name: Build Docker image 
        run: |
          docker build -t ${{ steps.meta.outputs.image_tag }} ${{ inputs.service_path }}

      - name: Save Docker image to tar
        run: docker save ${{ steps.meta.outputs.image_tag }} -o /tmp/image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ inputs.service_name }}
          path: /tmp/image.tar
          retention-days: 1


