name: helm-updater

on:
  workflow_call:
    inputs:
      service_name:
        description: "Name of the microservice (e.g. adservice)"
        required: true
        type: string
      image_tag:
        description: "New image tag to write (e.g. develop-abc12345)"
        required: true
        type: string
      helm_values_path:
        description: "Relative path to the values file inside hipstershop-helm-charts (e.g. hipstershop-micro-apps/adservice/values.dev.yaml)"
        required: true
        type: string
      target_branch:
        description: "Branch of hipstershop-helm-charts to checkout and push to (e.g. develop or main)"
        required: false
        type: string
        default: main
    secrets:
      HELM_CHARTS_TOKEN:
        description: "PAT with contents:write on hipstershop-helm-charts"
        required: true


jobs:

  update-helm-values:
    name: Update helm values
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hipstershop-helm-charts
        uses: actions/checkout@v4
        with:
          repository: HipsterShopp/hipstershop-helm-charts
          token: ${{ secrets.HELM_CHARTS_TOKEN }}
          ref: ${{ inputs.target_branch }}

      - name: Update image tag in values file
        run: |
          FILE="${{ inputs.helm_values_path }}"

          if [ ! -f "$FILE" ]; then
            echo "ERROR: $FILE not found in hipstershop-helm-charts (${{ inputs.target_branch }} branch)"
            exit 1
          fi

          echo "Before:"
          grep "hipstershop-${{ inputs.service_name }}" "$FILE" || true

          # values.dev.yaml uses single-string image format:
          #   servicename: "yampss/hipstershop-<service>:<old-tag>"
          # The pattern [^\"]* matches everything up to (not including) the closing double-quote,
          # so only the tag portion is replaced and the surrounding quotes are preserved.
          sed -i "s|yampss/hipstershop-${{ inputs.service_name }}:[^\"]*|yampss/hipstershop-${{ inputs.service_name }}:${{ inputs.image_tag }}|g" "$FILE"

          echo "After:"
          grep "hipstershop-${{ inputs.service_name }}" "$FILE"

      - name: Commit and push
        run: |
          git config user.name  "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${{ inputs.helm_values_path }}"
          git diff --cached --quiet && echo "No changes — tag already up to date" && exit 0

          git commit -m "chore(${{ inputs.service_name }}): update image tag to ${{ inputs.image_tag }}"
          git push origin ${{ inputs.target_branch }}