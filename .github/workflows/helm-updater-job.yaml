name: helm-updater

on:
  workflow_call:
    inputs:
      service_name:
        description: "Name of the microservice"
        required: true
        type: string
      image_tag:
        description: "New image tag to write into values.yaml"
        required: true
        type: string
      helm_values_path:
        description: "Path to values.yaml inside hipstershop-helm-charts repo"
        required: true
        type: string
    secrets:
      HELM_CHARTS_TOKEN:
        description: "PAT with contents:write on hipstershop-helm-charts repo"
        required: true


jobs:

  update-helm-values:
    name: update helm values
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hipstershop-helm-charts
        uses: actions/checkout@v4
        with:
          repository: HipsterShopp/hipstershop-helm-charts
          token: ${{ secrets.HELM_CHARTS_TOKEN }}
          ref: main

      - name: Update image tag
        run: |
          FILE="${{ inputs.helm_values_path }}"

          if [ ! -f "$FILE" ]; then
            echo "ERROR: $FILE not found in hipstershop-helm-charts repo"
            exit 1
          fi

          echo "Before:"
          grep "tag:" "$FILE" || true

          # Target the specific indented `tag:` line under images.<service>
          sed -i "s|^\(\s*tag:\s*\).*|\1${{ inputs.image_tag }}|" "$FILE"

          echo "After:"
          grep "tag:" "$FILE"

      - name: Commit and push
        run: |
          git config user.name  "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${{ inputs.helm_values_path }}"
          git diff --cached --quiet && echo "No changes — tag already up to date" && exit 0

          git commit -m "chore(${{ inputs.service_name }}): update image tag to ${{ inputs.image_tag }}"
          git push origin main